# Training config: teacher model GRPO alignment.
# Requires: log/teacher_sft/teacher_sft.pt
# Usage: python grpo.py --config config/teacher_grpo.yaml
#
# Config name = log subdirectory name (log/teacher_grpo/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/teacher_sft.jsonl    # only the prompt field is used for rollouts

model:
  vocab_size: 34
  context_len: 96
  d_model: 192
  n_layers: 6
  n_heads: 6
  d_head: 32
  d_ffn: 768
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: log/teacher_sft/teacher_sft.pt
  reference_model_path: log/teacher_sft/teacher_sft.pt   # KL penalty reference
  lr: 5.0e-5
  lr_schedule: cosine
  batch_size: 32                  # prompts per step
  n_steps: 600
  warmup_steps: 50
  weight_decay: 0.0
  grad_clip: 1.0
  n_rollouts_per_prompt: 8        # G: rollouts per prompt
  clip_eps: 0.2                   # importance sampling clip epsilon
  kl_coeff: 0.05                  # beta: KL penalty coefficient
  reward_fn: interpreter          # interpreter | partial_match
  rollout_temperature: 1.0
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: log/teacher_grpo/teacher_grpo.pt
  log_dir: log/teacher_grpo

logging:
  log_every: 20
  eval_batch_size: 256
  eval_data_path: data/eval_10k_depth5.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: log/teacher_grpo/checkpoint
  grid_res: 31
  pca_basis_path: log/teacher_pretrain/pca_basis.npz  # reuse pretrain PCA axes for comparable landscapes

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: true
  show_raw: false
  device: cuda
