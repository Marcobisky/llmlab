# Training config: student model SFT.
# Dataset must be generated first: python data.py --config config/stmt_100k_depth5.yaml
# Usage: python sft.py --config config/student_sft.yaml
#
# Config name = log subdirectory name (log/student_sft/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/student_sft.jsonl

model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: log/student_pretrain/student_pretrain.pt
  lr: 1.0e-4
  lr_schedule: cosine
  batch_size: 64
  n_steps: 5000
  warmup_steps: 300
  weight_decay: 0.1
  grad_clip: 1.0
  loss_on_prompt: false
  amp: true
  amp_dtype: bf16
  compile: false
  seed: 42
  device: cuda

output:
  model_path: log/student_sft/student_sft.pt
  log_dir: log/student_sft

logging:
  log_every: 50
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: log/student_sft/checkpoint
  grid_res: 31
  pca_basis_path: log/student_pretrain/pca_basis.npz  # reuse pretrain PCA axes for comparable landscapes

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: false
  show_raw: false
  device: cuda
