data:
  path: data/student_sft.jsonl
  split: student_train
  n_samples: 100000
  depth_range: [0, 5]
  operand_len_range: [1, 6]
  n_operands_range: [1, 3]
  ops_enabled: all
  check_fraction: 0.0
  verdict_ratio: [5, 3, 2]
  cot_fraction: 0.0
  vw_corruption: swap
  noise_rate: 0.0
  seed: 45

model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: model/student_pretrain.pt
  lr: 1.0e-4
  lr_schedule: cosine
  batch_size: 64
  n_steps: 5000
  warmup_steps: 300
  weight_decay: 0.1
  grad_clip: 1.0
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: model/student_sft.pt
  log_dir: log/student_sft/

logging:
  log_every: 50
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/student_sft/
  grid_res: 31
