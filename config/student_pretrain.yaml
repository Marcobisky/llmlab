# Training config: student model pretraining.
# Dataset must be generated first: python data.py --config config/expr_200k_depth4.yaml
# Usage: python pretrain.py --config config/student_pretrain.yaml
#
# Config name = log subdirectory name (log/student_pretrain/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/expr_200k_depth4.jsonl

model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.1
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  lr: 1.0e-3
  lr_schedule: cosine
  batch_size: 1024
  n_steps: 50000
  warmup_steps: 2000
  weight_decay: 0.1
  grad_clip: 2.0
  amp: true
  amp_dtype: bf16
  compile: true
  seed: 42
  device: cuda

output:
  model_path: log/student_pretrain/student_pretrain.pt
  log_dir: log/student_pretrain

logging:
  log_every: 1000
  eval_every: 5000             # full eval every 5k steps -> ~10 eval points
  eval_batch_size: 256
  eval_data_path: data/eval_10k_depth5.jsonl
  save_ckpt: true                 # pretrain must save checkpoints to compute PCA basis
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: log/student_pretrain/checkpoint
  grid_res: 31

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: false
  show_raw: false
  device: cuda
