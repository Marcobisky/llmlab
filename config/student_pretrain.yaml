data:
  path: data/student_pretrain.jsonl
  split: student_train
  n_samples: 50000
  depth_range: [0, 5]
  operand_len_range: [1, 6]
  n_operands_range: [1, 3]
  ops_enabled: all
  check_fraction: 0.15
  verdict_ratio: [5, 3, 2]
  cot_fraction: 0.0               # student pretrain 默认不加 CoT
  vw_corruption: swap
  noise_rate: 0.0
  seed: 44

model:
  vocab_size: 34
  context_len: 48
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  lr: 3.0e-4
  lr_schedule: cosine
  batch_size: 64
  n_steps: 3000
  warmup_steps: 200
  weight_decay: 0.1
  grad_clip: 1.0
  seed: 42
  device: cuda

output:
  model_path: model/student_pretrain.pt
  log_dir: log/student_pretrain/

logging:
  log_every: 50
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/student_pretrain/
  grid_res: 31
  landscape_alpha_range: [-1.0, 1.0]
  landscape_beta_range: [-1.0, 1.0]
