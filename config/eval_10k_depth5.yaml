# Data generation config: 10k eval samples, depth 0-5, eval split.
# Usage: python data.py --config config/eval_10k_depth5.yaml
# Output: data/eval_10k_depth5.jsonl
# Note: expressions in the eval set are excluded from all training datasets.
#
# Designed to be MORE diverse than any single training dataset:
#   - n_operands up to 5 (vs training max of 4 for teacher, 3 for student)
#   - higher check_fraction (0.25) for broader sentence-type coverage
#   - no CoT samples — evaluation tests result correctness only,
#     not the model's ability to produce a trace format

data:
  path: data/eval_10k_depth5.jsonl
  split: eval
  n_samples: 10000
  depth_range: [0, 5]
  operand_len_range: [1, 8]
  n_operands_range: [1, 5]        # wider than any training set for OOD coverage
  ops_enabled: all
  check_fraction: 0.25            # more check (vc/vw/gw) diversity
  verdict_ratio: [5, 3, 2]
  cot_fraction: 0.0               # no CoT in eval — only the final result matters
  vw_corruption: swap
  noise_rate: 0.0
  seed: 99
  exclude_from:
    - data/expr_500k_depth5.jsonl
    - data/teacher_sft.jsonl
    - data/student_pretrain.jsonl
    - data/student_sft.jsonl

context_len: 96
