data:
  path: data/student_sft.jsonl
  split: student_train
  depth_range: [0, 5]
  seed: 42

model:
  vocab_size: 34
  context_len: 48
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: model/student_sft.pt
  reference_model_path: model/student_sft.pt   # KL 惩罚的参考点
  lr: 5.0e-5
  lr_schedule: cosine
  batch_size: 32
  n_steps: 400
  warmup_steps: 40
  weight_decay: 0.0
  grad_clip: 1.0
  n_rollouts_per_prompt: 8
  clip_eps: 0.2
  kl_coeff: 0.05
  reward_fn: interpreter          # interpreter | partial_match
  rollout_temperature: 1.0
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: model/student_grpo.pt
  log_dir: log/student_grpo/

logging:
  log_every: 20
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/student_grpo/
  grid_res: 31
