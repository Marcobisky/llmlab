# Training config: student model GRPO alignment.
# Requires: log/student_sft/student_sft.pt
# Usage: python grpo.py --config config/student_grpo.yaml
#
# Config name = log subdirectory name (log/student_grpo/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/expr_500k_depth5.jsonl

model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: log/student_pretrain/student_pretrain.pt
  reference_model_path: log/student_pretrain/student_pretrain.pt   # KL penalty reference
  lr: 3.0e-5
  lr_schedule: cosine
  n_runs: 3                      # repeat GRPO with seed, seed+1, ...; each run writes log/student_grpo/run_xx/
  batch_size: 32                  # prompts per step
  n_steps: 1000
  warmup_steps: 80
  weight_decay: 0.0
  grad_clip: 1.0
  n_rollouts_per_prompt: 16       # G: larger group reduces GRPO advantage noise
  clip_eps: 0.2                   # importance sampling clip epsilon
  kl_coeff: 0.03                  # beta: lower KL allows more improvement from pretrain
  rollout_min_depth: 3            # focus RL signal on harder prompts; depths 0-2 are already near-perfect
  rollout_max_depth: 5
  reward_fn: interpreter          # interpreter | partial_match
  rollout_temperature: 1.0
  loss_on_prompt: false
  amp: true
  amp_dtype: bf16
  seed: 42
  device: cuda

output:
  model_path: log/student_grpo/student_grpo.pt
  log_dir: log/student_grpo

logging:
  log_every: 20
  eval_every: 100              # full eval every 100 steps
  eval_batch_size: 256
  eval_data_path: data/eval_10k_depth5.jsonl
  save_ckpt: false                # post-training reuses pretrain PCA basis; no checkpoints needed
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: log/student_grpo/checkpoint
  grid_res: 31
  pca_basis_path: log/student_pretrain/pca_basis.npz  # reuse pretrain PCA axes for comparable landscapes

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: true
  show_raw: false
  device: cuda
