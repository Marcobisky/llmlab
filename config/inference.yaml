model_path: model/student_grpo.pt   # 要加载的权重
model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu
inference:
  temperature: 0.0                  # 0 = greedy，>0 = sampling
  top_p: 1.0
  max_new_tokens: 48
  show_cot: true
  device: cuda
