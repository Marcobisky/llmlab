# Data generation config: 500k mixed expr/check/cot samples, depth 0-5, teacher split.
# Usage: python data.py --config config/expr_500k_depth5.yaml
# Output: data/teacher_pretrain.jsonl

data:
  path: data/teacher_pretrain.jsonl
  split: teacher_train
  n_samples: 500000               # depth 0-5 x operand [2,8] space is large, near-zero repetition
  depth_range: [0, 5]
  operand_len_range: [2, 8]       # min 2 digits (avoid trivial single-char), max 8
  n_operands_range: [1, 3]
  ops_enabled: all
  check_fraction: 0.15
  verdict_ratio: [5, 3, 2]        # vc : vw : gw
  cot_fraction: 0.1               # CoT traces pass ctx=96 filter at ~88%
  vw_corruption: swap
  noise_rate: 0.0
  seed: 42

context_len: 96   # max sequence length; samples exceeding this are discarded
