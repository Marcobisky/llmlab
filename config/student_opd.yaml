data:
  path: data/student_sft.jsonl    # 只取 prompt，rollout 由 student 自己生成
  split: student_train
  depth_range: [0, 5]
  seed: 42

model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: model/student_sft.pt
  teacher_model_path: model/teacher_final.pt
  lr: 5.0e-5
  lr_schedule: cosine
  batch_size: 32
  n_steps: 600
  warmup_steps: 60
  weight_decay: 0.0
  grad_clip: 1.0
  kl_direction: forward
  temperature: 1.0
  rollout_temperature: 1.0        # student rollout 时的采样温度
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: model/student_opd.pt
  log_dir: log/student_opd/

logging:
  log_every: 50
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/student_opd/
  grid_res: 31
