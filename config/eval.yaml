# eval 数据集生成配置
# 注意：data.py 在生成 eval 时会排除已有训练集中的所有 expr
data:
  path: data/eval.jsonl
  split: eval
  n_samples: 10000
  depth_range: [0, 5]
  operand_len_range: [2, 8]
  n_operands_range: [1, 3]
  ops_enabled: all
  check_fraction: 0.15
  verdict_ratio: [5, 3, 2]
  cot_fraction: 0.2
  vw_corruption: swap
  noise_rate: 0.0
  seed: 99
  exclude_from:
    - data/teacher_pretrain.jsonl
    - data/teacher_sft.jsonl
    - data/student_pretrain.jsonl
    - data/student_sft.jsonl

model:
  context_len: 96                 # data.py 用此字段过滤超长样本
