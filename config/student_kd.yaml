# Training config: student model knowledge distillation from teacher.
# Requires: log/student_pretrain/student_pretrain.pt and a trained teacher model.
# Usage: python kd.py --config config/student_kd.yaml
#
# Config name = log subdirectory name (log/student_kd/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/expr_500k_depth5.jsonl    # teacher rolls out on these prompts

model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: log/student_pretrain/student_pretrain.pt
  teacher_model_path: log/teacher_grpo/run_00/teacher_grpo_run_00.pt   # distillation source
  lr: 3.0e-5
  lr_schedule: cosine
  batch_size: 128
  n_steps: 3000
  warmup_steps: 200
  weight_decay: 0.0
  grad_clip: 1.0
  kl_direction: forward           # forward | reverse
  prefix_source: dataset          # dataset | rollout; off-policy KD uses clean data prefixes
  temperature: 2.0                # soften teacher distribution for the small student
  alpha_ce: 0.1                   # clean hard-token anchor mixed with soft KL
  rollout_temperature: 0.0        # only used when prefix_source=rollout
  filter_teacher_correct: false   # only used when prefix_source=rollout
  rollout_min_depth: 0            # full-depth replay avoids shallow-skill forgetting
  rollout_max_depth: 5
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: log/student_kd/student_kd.pt
  log_dir: log/student_kd

logging:
  log_every: 50
  eval_every: 300              # full eval every 300 steps
  eval_batch_size: 256
  kl_metric_batch_size: 256
  eval_data_path: data/eval_10k_depth5.jsonl
  save_ckpt: false                # post-training reuses pretrain PCA basis; no checkpoints needed
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: log/student_kd/checkpoint
  grid_res: 31
  pca_basis_path: log/student_pretrain/pca_basis.npz  # reuse pretrain PCA axes for comparable landscapes

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: true
  show_raw: false
  device: cuda
