# Training config: student model knowledge distillation from teacher.
# Requires: log/student_sft/student_sft.pt and a trained teacher model.
# Usage: python kd.py --config config/student_kd.yaml
#
# Config name = log subdirectory name (log/student_kd/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/student_sft.jsonl    # teacher rolls out on these prompts

model:
  vocab_size: 34
  context_len: 96
  d_model: 64
  n_layers: 3
  n_heads: 4
  d_head: 16
  d_ffn: 256
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: log/student_sft/student_sft.pt
  teacher_model_path: log/teacher_grpo/teacher_grpo.pt   # distillation source
  lr: 1.0e-4
  lr_schedule: cosine
  batch_size: 64
  n_steps: 800
  warmup_steps: 80
  weight_decay: 0.0
  grad_clip: 1.0
  kl_direction: forward           # forward | reverse
  temperature: 1.0                # softmax temperature for distillation
  alpha_ce: 0.0                   # CE loss mix ratio (0 = pure KL)
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: log/student_kd/student_kd.pt
  log_dir: log/student_kd

logging:
  log_every: 50
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: log/student_kd/checkpoint
  grid_res: 31
  pca_basis_path: log/student_pretrain/pca_basis.npz  # reuse pretrain PCA axes for comparable landscapes

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: false
  show_raw: false
  device: cuda
