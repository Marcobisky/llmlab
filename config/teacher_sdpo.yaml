# Training config: teacher model SDPO alignment.
# Requires: log/teacher_sft/teacher_sft.pt
# Usage: python sdpo.py --config config/teacher_sdpo.yaml
#
# Config name = log subdirectory name (log/teacher_sdpo/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/teacher_sft.jsonl

model:
  vocab_size: 34
  context_len: 96
  d_model: 192
  n_layers: 6
  n_heads: 6
  d_head: 32
  d_ffn: 768
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: log/teacher_sft/teacher_sft.pt
  lr: 5.0e-5
  lr_schedule: cosine
  batch_size: 32
  n_steps: 600
  warmup_steps: 50
  weight_decay: 0.0
  grad_clip: 1.0
  feedback_type: ground_truth     # append GT result to prompt as feedback
  sdpo_temperature: 1.0
  kl_coeff: 0.05
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: log/teacher_sdpo/teacher_sdpo.pt
  log_dir: log/teacher_sdpo

logging:
  log_every: 20
  eval_every: 100              # full eval every 100 steps
  eval_batch_size: 256
  eval_data_path: data/eval_10k_depth5.jsonl
  save_ckpt: false                # post-training reuses pretrain PCA basis; no checkpoints needed
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: log/teacher_sdpo/checkpoint
  grid_res: 31
  pca_basis_path: log/teacher_pretrain/pca_basis.npz  # reuse pretrain PCA axes for comparable landscapes

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: true
  show_raw: false
  device: cuda
