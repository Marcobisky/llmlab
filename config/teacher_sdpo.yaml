data:
  path: data/teacher_sft.jsonl
  split: teacher_train
  depth_range: [0, 5]
  seed: 42

model:
  vocab_size: 34
  context_len: 96
  d_model: 192
  n_layers: 6
  n_heads: 6
  d_head: 32
  d_ffn: 768
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: model/teacher_sft.pt
  lr: 5.0e-5
  lr_schedule: cosine
  batch_size: 32
  n_steps: 600
  warmup_steps: 50
  weight_decay: 0.0
  grad_clip: 1.0
  feedback_type: ground_truth     # 把 GT 结果拼入 prompt 作为 feedback
  sdpo_temperature: 1.0
  kl_coeff: 0.05
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: model/teacher_sdpo.pt
  log_dir: log/teacher_sdpo/

logging:
  log_every: 20
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/teacher_sdpo/
  grid_res: 31
