data:
  path: data/teacher_sft.jsonl
  split: teacher_train
  n_samples: 50000              # CoT 样本比 stmt 长 3-5×，50k 足够 SFT
  depth_range: [0, 5]           # 全深度，与 pretrain 保持一致
  operand_len_range: [2, 5]     # 略短于 pretrain [2,8]，提高 ctx=96 的 CoT 过滤通过率
  n_operands_range: [1, 3]
  ops_enabled: all
  check_fraction: 0.0           # 不用检查句（check 数据不含思维链）
  cot_fraction: 1.0             # ← 全部 CoT：[BOS] EXPR → <think> TRACE </think> = RESULT [EOS]
  vw_corruption: swap
  seed: 43

model:
  vocab_size: 34
  context_len: 96
  d_model: 192
  n_layers: 6
  n_heads: 6
  d_head: 32
  d_ffn: 768
  dropout: 0.0                  # 精调阶段关闭 dropout（pretrain 用 0.1）
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: model/teacher_pretrain.pt
  lr: 1.0e-4                    # 比 pretrain (1e-3) 小 10×，保留已有知识
  lr_schedule: cosine
  batch_size: 256               # CoT 序列较长，适当小于 pretrain 的 1024
  n_steps: 5000                 # 50k/256 ≈ 195 steps/epoch → ~25 epochs
  warmup_steps: 200
  weight_decay: 0.1
  grad_clip: 1.0
  amp: true
  amp_dtype: bf16
  compile: true
  seed: 42
  device: cuda

output:
  model_path: model/teacher_sft.pt
  log_dir: log/teacher_sft/

logging:
  log_every: 100                # 5000/100 = 50 个 log 点
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 20
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/teacher_sft/
  grid_res: 31
