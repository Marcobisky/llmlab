data:
  path: data/teacher_sft.jsonl
  split: teacher_train
  n_samples: 20000
  depth_range: [0, 3]
  operand_len_range: [1, 6]
  n_operands_range: [1, 3]
  ops_enabled: all
  check_fraction: 0.0             # SFT 只用生成任务
  verdict_ratio: [5, 3, 2]
  cot_fraction: 0.0
  vw_corruption: swap
  noise_rate: 0.0
  seed: 43

model:
  vocab_size: 34
  context_len: 48
  d_model: 192
  n_layers: 6
  n_heads: 6
  d_head: 32
  d_ffn: 768
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: model/teacher_pretrain.pt
  lr: 1.0e-4
  lr_schedule: cosine
  batch_size: 64
  n_steps: 1500
  warmup_steps: 100
  weight_decay: 0.1
  grad_clip: 1.0
  loss_on_prompt: false
  seed: 42
  device: cuda

output:
  model_path: model/teacher_sft.pt
  log_dir: log/teacher_sft/

logging:
  log_every: 50
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/teacher_sft/
  grid_res: 31
  landscape_alpha_range: [-1.0, 1.0]
  landscape_beta_range: [-1.0, 1.0]
