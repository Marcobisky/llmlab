# Training config: teacher model SFT on CoT data.
# Dataset must be generated first: python data.py --config config/cot_50k_depth5.yaml
# Usage: python sft.py --config config/teacher_sft.yaml
#
# Config name = log subdirectory name (log/teacher_sft/).
# To start a new training run, create a NEW config file — do not reuse this one.

data:
  path: data/teacher_sft.jsonl    # path to pre-generated CoT dataset

model:
  vocab_size: 34
  context_len: 96
  d_model: 192
  n_layers: 6
  n_heads: 6
  d_head: 32
  d_ffn: 768
  dropout: 0.0                    # disable dropout during fine-tuning
  tie_embedding: true
  pos_embedding: learned
  norm_type: pre_ln
  activation: gelu

train:
  base_model_path: log/teacher_pretrain/teacher_pretrain.pt
  lr: 1.0e-4                      # 10x smaller than pretrain to retain learned knowledge
  lr_schedule: cosine
  batch_size: 256                  # CoT sequences are longer; smaller batch than pretrain
  n_steps: 5000                    # 50k/256 ≈ 195 steps/epoch -> ~25 epochs
  warmup_steps: 200
  weight_decay: 0.1
  grad_clip: 1.0
  amp: true
  amp_dtype: bf16
  compile: true
  seed: 42
  device: cuda

output:
  model_path: log/teacher_sft/teacher_sft.pt
  log_dir: log/teacher_sft

logging:
  log_every: 100                   # 5000/100 = 50 log points
  eval_every: 500              # full eval every 500 steps -> ~10 eval points
  eval_batch_size: 256
  eval_data_path: data/eval_10k_depth5.jsonl
  n_traj_ckpt: 20
  ckpt_dtype: float16
  tmp_ckpt_dir: log/teacher_sft/checkpoint
  grid_res: 31
  pca_basis_path: log/teacher_pretrain/pca_basis.npz  # reuse pretrain PCA axes for comparable landscapes

inference:
  temperature: 0.0
  top_p: 1.0
  max_new_tokens: 96
  show_cot: true
  show_raw: false
  device: cuda
