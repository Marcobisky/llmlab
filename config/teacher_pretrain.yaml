data:
  path: data/teacher_pretrain.jsonl
  split: teacher_train
  n_samples: 50000
  depth_range: [0, 3]
  operand_len_range: [1, 6]
  n_operands_range: [1, 3]
  ops_enabled: all
  check_fraction: 0.15
  verdict_ratio: [5, 3, 2]        # vc : vw : gw
  cot_fraction: 0.2               # teacher pretrain 启用 CoT
  vw_corruption: swap             # swap | replace | truncate | shuffle
  noise_rate: 0.0
  seed: 42

model:
  vocab_size: 34                  # 32 + <think> + </think>
  context_len: 48
  d_model: 192
  n_layers: 6
  n_heads: 6
  d_head: 32
  d_ffn: 768
  dropout: 0.0
  tie_embedding: true
  pos_embedding: learned          # learned | sinusoidal
  norm_type: pre_ln
  activation: gelu

train:
  lr: 3.0e-4
  lr_schedule: cosine             # cosine | constant
  batch_size: 128
  n_steps: 3000
  warmup_steps: 200
  weight_decay: 0.1
  grad_clip: 1.0
  seed: 42
  device: cuda

output:
  model_path: model/teacher_pretrain.pt
  log_dir: log/teacher_pretrain/

logging:
  log_every: 50
  eval_batch_size: 256
  eval_data_path: data/eval.jsonl
  n_traj_ckpt: 30
  ckpt_dtype: float16
  tmp_ckpt_dir: tmp/teacher_pretrain/
  grid_res: 31
  landscape_alpha_range: [-1.0, 1.0]
  landscape_beta_range: [-1.0, 1.0]
